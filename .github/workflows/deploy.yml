name: Deploy

# 同时部署到 Vercel（GitHub 集成自动完成）和阿里云 OSS
# 本 workflow 仅负责阿里云 OSS 部署

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'manifest.json'
      - 'vercel.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy-to-oss:
    name: 部署到阿里云 OSS
    runs-on: ubuntu-latest
    # 仅当配置了阿里云 OSS 凭据时才执行
    # 在 GitHub 仓库 Settings → Secrets and variables → Actions 添加：
    #   Secrets:  ALIBABA_OSS_ACCESS_KEY_ID, ALIBABA_OSS_ACCESS_KEY_SECRET
    #   Variables: ALIBABA_OSS_BUCKET, ALIBABA_OSS_ENDPOINT, ALIBABA_OSS_REGION
    if: ${{ vars.ALIBABA_OSS_BUCKET != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install OSS SDK
        run: pip install oss2

      - name: Deploy to OSS
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.ALIBABA_OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.ALIBABA_OSS_ACCESS_KEY_SECRET }}
          OSS_BUCKET: ${{ vars.ALIBABA_OSS_BUCKET }}
          OSS_ENDPOINT: ${{ vars.ALIBABA_OSS_ENDPOINT }}
          OSS_REGION: ${{ vars.ALIBABA_OSS_REGION }}
        run: |
          python3 - <<'PYEOF'
          import os
          import oss2

          ak_id = os.environ["OSS_ACCESS_KEY_ID"]
          ak_secret = os.environ["OSS_ACCESS_KEY_SECRET"]
          bucket_name = os.environ["OSS_BUCKET"]
          endpoint = os.environ.get("OSS_ENDPOINT", "https://oss-cn-hongkong.aliyuncs.com")

          auth = oss2.Auth(ak_id, ak_secret)
          bucket = oss2.Bucket(auth, endpoint, bucket_name)

          files = ["index.html", "manifest.json", "vercel.json"]
          content_types = {
              ".html": "text/html; charset=utf-8",
              ".json": "application/manifest+json; charset=utf-8",
          }
          cache_control = {"index.html": "public, max-age=0, must-revalidate"}

          ok = 0
          for name in files:
              if not os.path.exists(name):
                  continue
              ext = os.path.splitext(name)[1].lower()
              headers = {
                  oss2.headers.OSS_CONTENT_TYPE: content_types.get(ext, "application/octet-stream"),
                  oss2.headers.OSS_CACHE_CONTROL: cache_control.get(name, "public, max-age=86400"),
                  oss2.headers.OSS_OBJECT_ACL: "public-read",
              }
              bucket.put_object_from_file(name, name, headers=headers)
              print(f"✅ {name} uploaded")
              ok += 1

          print(f"\n部署完成: {ok} 文件")
          print(f"访问地址: https://{bucket_name}.{endpoint.replace('https://', '')}/index.html")
          PYEOF

      - name: Summary
        if: always()
        run: |
          echo "## 部署结果" >> $GITHUB_STEP_SUMMARY
          echo "- Vercel: 由 GitHub 集成自动部署" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "- 阿里云 OSS: ✅ 成功" >> $GITHUB_STEP_SUMMARY
          else
            echo "- 阿里云 OSS: ⚠️  未配置凭据或部署失败（不影响 Vercel）" >> $GITHUB_STEP_SUMMARY
          fi
