name: Deploy

# 同时部署到 Vercel（已绑定 GitHub 自动部署）和腾讯云 COS
# Vercel 部署由其 GitHub 集成自动完成，本 workflow 仅负责腾讯云 COS

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'manifest.json'
      - 'vercel.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: # 支持手动触发

jobs:
  deploy-to-cos:
    name: 部署到腾讯云 COS
    runs-on: ubuntu-latest
    # 仅当配置了腾讯云 COS 密钥时才执行
    # 在 GitHub 仓库 Settings → Secrets and variables → Actions 添加：
    #   TENCENT_COS_SECRET_ID
    #   TENCENT_COS_SECRET_KEY
    #   TENCENT_COS_BUCKET       (例如: lianai-xiaowu-1300000000)
    #   TENCENT_COS_REGION       (例如: ap-hongkong)
    if: ${{ vars.TENCENT_COS_BUCKET != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install COS SDK
        run: pip install cos-python-sdk-v5

      - name: Deploy to COS
        env:
          TENCENTCOS_SECRET_ID: ${{ secrets.TENCENT_COS_SECRET_ID }}
          TENCENTCOS_SECRET_KEY: ${{ secrets.TENCENT_COS_SECRET_KEY }}
          COS_BUCKET: ${{ vars.TENCENT_COS_BUCKET }}
          COS_REGION: ${{ vars.TENCENT_COS_REGION }}
        run: |
          python3 - <<'PYEOF'
          import os
          from qcloud_cos import CosConfig, CosS3Client

          secret_id = os.environ["TENCENTCOS_SECRET_ID"]
          secret_key = os.environ["TENCENTCOS_SECRET_KEY"]
          bucket = os.environ["COS_BUCKET"]
          region = os.environ.get("COS_REGION", "ap-hongkong")

          config = CosConfig(Region=region, SecretId=secret_id, SecretKey=secret_key, Scheme="https")
          client = CosS3Client(config)

          files = ["index.html", "manifest.json", "vercel.json"]
          content_types = {
              ".html": "text/html; charset=utf-8",
              ".json": "application/manifest+json; charset=utf-8",
          }
          cache_control = {"index.html": "public, max-age=0, must-revalidate"}

          ok = 0
          for name in files:
              if not os.path.exists(name):
                  continue
              ext = os.path.splitext(name)[1].lower()
              client.upload_file(
                  Bucket=bucket,
                  Key=name,
                  LocalFilePath=name,
                  ContentType=content_types.get(ext, "application/octet-stream"),
                  CacheControl=cache_control.get(name, "public, max-age=86400"),
                  ACL="public-read",
              )
              print(f"✅ {name} uploaded")
              ok += 1

          print(f"\n部署完成: {ok} 文件")
          print(f"访问地址: https://{bucket}.cos.{region}.myqcloud.com/index.html")
          PYEOF

      - name: Summary
        if: always()
        run: |
          echo "## 部署结果" >> $GITHUB_STEP_SUMMARY
          echo "- Vercel: 由 GitHub 集成自动部署（无需本 workflow）" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "- 腾讯云 COS: ✅ 成功" >> $GITHUB_STEP_SUMMARY
          else
            echo "- 腾讯云 COS: ⚠️  未配置密钥或部署失败（不影响 Vercel）" >> $GITHUB_STEP_SUMMARY
          fi
