name: Deploy

# 同时部署到 Vercel（GitHub 集成自动完成）和阿里云 OSS
# 本 workflow 仅负责阿里云 OSS 部署
#
# 配置方法（一次性）：
# 1. 打开 https://github.com/CloudD67/lianai-xiaowu/settings/secrets/actions
# 2. 在 "Secrets" 区域点 "New repository secret" 添加：
#    - Name: ALIBABA_OSS_ACCESS_KEY_ID      Value: 你的 AccessKey ID
#    - Name: ALIBABA_OSS_ACCESS_KEY_SECRET   Value: 你的 AccessKey Secret
# 3. 在 "Variables" 区域点 "New repository variable" 添加：
#    - Name: ALIBABA_OSS_BUCKET   Value: lianai-xiaowu-cloudd67
#    - Name: ALIBABA_OSS_ENDPOINT Value: oss-cn-hongkong.aliyuncs.com
# 配置完成后，每次 push 到 main 分支会自动部署到 OSS

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'manifest.json'
      - 'vercel.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy-to-oss:
    name: 部署到阿里云 OSS
    runs-on: ubuntu-latest
    # 仅当配置了阿里云 OSS 凭据时才执行
    if: ${{ vars.ALIBABA_OSS_BUCKET != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install OSS SDK
        run: pip install oss2

      - name: Deploy to OSS
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.ALIBABA_OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.ALIBABA_OSS_ACCESS_KEY_SECRET }}
          OSS_BUCKET: ${{ vars.ALIBABA_OSS_BUCKET }}
          OSS_ENDPOINT: ${{ vars.ALIBABA_OSS_ENDPOINT }}
        run: |
          python3 - <<'PYEOF'
          import os, sys
          import oss2

          ak_id = os.environ["OSS_ACCESS_KEY_ID"]
          ak_secret = os.environ["OSS_ACCESS_KEY_SECRET"]
          bucket_name = os.environ["OSS_BUCKET"]
          endpoint = "https://" + os.environ.get("OSS_ENDPOINT", "oss-cn-hongkong.aliyuncs.com")

          print(f"Bucket: {bucket_name}")
          print(f"Endpoint: {endpoint}")

          auth = oss2.Auth(ak_id, ak_secret)
          bucket = oss2.Bucket(auth, endpoint, bucket_name)

          # 验证凭据：尝试获取 bucket info
          try:
              info = bucket.get_bucket_info()
              print(f"✅ 凭据有效，Bucket 创建于: {info.creation_date}")
          except oss2.exceptions.SignatureDoesNotMatch as e:
              print(f"❌ 签名不匹配，请检查 AccessKey Secret 是否正确复制")
              sys.exit(1)
          except oss2.exceptions.NoSuchBucket:
              print(f"⚠️ Bucket 不存在，尝试创建...")
              try:
                  bucket.create_bucket(oss2.models.BUCKET_ACL_PUBLIC_READ)
                  print(f"✅ Bucket 已创建（香港，公有读）")
              except Exception as e2:
                  print(f"❌ 创建失败: {e2}")
                  sys.exit(1)
          except Exception as e:
              print(f"⚠️ 验证警告: {e}")

          # 配置静态网站托管
          try:
              bucket.put_bucket_website(oss2.models.BucketWebsite('index.html', 'index.html'))
              print(f"✅ 静态网站托管已启用")
          except Exception as e:
              print(f"⚠️ 静态网站配置: {e}")

          # 配置 CORS
          try:
              cors = oss2.models.CorsRule(
                  allowed_origins=['*'],
                  allowed_methods=['GET', 'HEAD', 'OPTIONS'],
                  allowed_headers=['*'],
                  max_age_seconds=3600
              )
              bucket.put_bucket_cors([cors])
              print(f"✅ CORS 已配置")
          except Exception as e:
              print(f"⚠️ CORS 配置: {e}")

          # 上传文件
          files_config = [
              ("index.html", "text/html; charset=utf-8", "no-cache"),
              ("manifest.json", "application/manifest+json", "max-age=86400"),
              ("vercel.json", "application/json", "max-age=86400"),
          ]

          ok = 0
          for fname, ctype, cache in files_config:
              if not os.path.exists(fname):
                  print(f"⚠️ 跳过 {fname}（文件不存在）")
                  continue
              try:
                  with open(fname, "rb") as f:
                      content = f.read()
                  bucket.put_object(fname, content, headers={
                      'Content-Type': ctype,
                      'Cache-Control': cache,
                  })
                  print(f"✅ {fname} ({len(content):,} bytes)")
                  ok += 1
              except Exception as e:
                  print(f"❌ {fname}: {e}")
                  sys.exit(1)

          endpoint_host = os.environ.get("OSS_ENDPOINT", "oss-cn-hongkong.aliyuncs.com")
          site_url = f"https://{bucket_name}.{endpoint_host}/index.html"
          print(f"\n{'='*50}")
          print(f"✅ 部署完成: {ok} 个文件")
          print(f"🌐 访问地址: {site_url}")
          print(f"{'='*50}")

          # 写入 GitHub Step Summary
          with open(os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null"), "a") as f:
              f.write(f"## 阿里云 OSS 部署成功\n\n")
              f.write(f"- Bucket: `{bucket_name}`\n")
              f.write(f"- 文件数: {ok}\n")
              f.write(f"- 访问地址: {site_url}\n")
          PYEOF

      - name: Summary on Failure
        if: failure()
        run: |
          echo "## 阿里云 OSS 部署失败" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "可能原因:" >> $GITHUB_STEP_SUMMARY
          echo "1. AccessKey Secret 复制不完整（请重新复制粘贴到 GitHub Secrets）" >> $GITHUB_STEP_SUMMARY
          echo "2. Bucket 名称冲突（请更换 ALIBABA_OSS_BUCKET 变量值）" >> $GITHUB_STEP_SUMMARY
          echo "3. AccessKey 已被禁用（请在阿里云 RAM 控制台检查）" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Vercel 部署不受影响。" >> $GITHUB_STEP_SUMMARY
